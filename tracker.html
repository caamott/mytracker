<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Camille's Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #f8fafc; font-family: 'DM Sans', 'Helvetica Neue', sans-serif; color: #1e293b; }
    input[type="range"] { accent-color: #0ea5e9; cursor: pointer; width: 100%; }
    input[type="date"]::-webkit-calendar-picker-indicator { opacity: 0.4; cursor: pointer; }
    @keyframes slideIn { from { transform: translateX(32px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes fadeUp  { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
    .todo-row:hover .todo-del { opacity: 1 !important; }
    .drag-handle { color: #e2e8f0; font-size: 12px; cursor: grab; user-select: none; padding: 11px 4px 11px 8px; }
    .drag-handle:hover { color: #94a3b8; }
    .task-row:hover { background: #fafafa !important; }
    textarea:focus, input:focus { outline: none; }
    ::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 99px; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback } = React;

const STATUSES = ["Not Started", "In Progress", "Blocked", "Done"];
const PRIORITIES = ["Low", "Medium", "High"];
const SIZES = ["Quick", "Small", "Medium", "Large", "Epic"];

const TAG_COLORS = [
  { bg: "#eff6ff", border: "#bfdbfe", color: "#3b82f6" },
  { bg: "#fdf4ff", border: "#e9d5ff", color: "#a855f7" },
  { bg: "#fff7ed", border: "#fed7aa", color: "#f97316" },
  { bg: "#f0fdf4", border: "#bbf7d0", color: "#22c55e" },
  { bg: "#fff1f2", border: "#fecdd3", color: "#f43f5e" },
  { bg: "#f0f9ff", border: "#bae6fd", color: "#0ea5e9" },
  { bg: "#fefce8", border: "#fef08a", color: "#ca8a04" },
  { bg: "#f8fafc", border: "#e2e8f0", color: "#64748b" },
];

const STATUS_CONFIG = {
  "Not Started": { color: "#94a3b8", bg: "#f1f5f9", border: "#e2e8f0", dot: "#cbd5e1" },
  "In Progress":  { color: "#0ea5e9", bg: "#f0f9ff", border: "#bae6fd", dot: "#0ea5e9" },
  "Blocked":      { color: "#ef4444", bg: "#fff1f2", border: "#fecdd3", dot: "#ef4444" },
  "Done":         { color: "#22c55e", bg: "#f0fdf4", border: "#bbf7d0", dot: "#22c55e" },
};

const PRIORITY_CONFIG = {
  Low:    { color: "#94a3b8", symbol: "↓" },
  Medium: { color: "#f59e0b", symbol: "→" },
  High:   { color: "#ef4444", symbol: "↑" },
};

const SIZE_CONFIG = {
  Quick:  { color: "#22c55e", desc: "< 30 min" },
  Small:  { color: "#84cc16", desc: "~1–2 hrs" },
  Medium: { color: "#f59e0b", desc: "~half day" },
  Large:  { color: "#f97316", desc: "1–2 days" },
  Epic:   { color: "#ef4444", desc: "multi-day" },
};

const MOTTOS = [
  (d, t) => d === t && t > 0 ? "🎉 Everything's done — you're on fire!" : null,
  (d, t) => t === 0 ? "A blank slate. What's on your mind?" : null,
  (d, t) => t > 0 && d / t >= 0.75 ? `Almost there — just ${t - d} left to go.` : null,
  (d, t) => d === 0 && t > 0 ? "Ready when you are. Let's make a dent." : null,
  (d, t) => d > 0 ? `${d} down, ${t - d} to go. Keep the momentum.` : null,
];

function getMotto(done, total) {
  for (const fn of MOTTOS) { const r = fn(done, total); if (r) return r; }
  return "You've got this.";
}

function generateId() { return Math.random().toString(36).slice(2, 9); }

function getTagColor(tag) {
  let hash = 0;
  for (let i = 0; i < tag.length; i++) hash = tag.charCodeAt(i) + ((hash << 5) - hash);
  return TAG_COLORS[Math.abs(hash) % TAG_COLORS.length];
}

function formatDate(dateStr) {
  if (!dateStr) return null;
  const d = new Date(dateStr + "T00:00:00");
  const today = new Date(); today.setHours(0,0,0,0);
  const diff = Math.round((d - today) / 86400000);
  if (diff < 0) return { label: `${Math.abs(diff)}d overdue`, color: "#ef4444", urgent: true };
  if (diff === 0) return { label: "Due today", color: "#f59e0b", urgent: true };
  if (diff === 1) return { label: "Tomorrow", color: "#f59e0b", urgent: false };
  if (diff <= 7) return { label: `${diff}d left`, color: "#0ea5e9", urgent: false };
  return { label: d.toLocaleDateString("en-GB", { day: "numeric", month: "short" }), color: "#94a3b8", urgent: false };
}

const SAMPLE_TASKS = [
  { id: generateId(), name: "Design system audit", status: "Done", priority: "High", size: "Medium", progress: 100, notes: "Reviewed all components. Found 12 inconsistencies.", dueDate: "", tags: ["design"], todos: [{ id: generateId(), text: "Export token list", done: true }, { id: generateId(), text: "Share with team", done: true }] },
  { id: generateId(), name: "Refactor auth module", status: "In Progress", priority: "High", size: "Large", progress: 60, notes: "Switching to refresh-token pattern.", dueDate: new Date(Date.now() + 2*86400000).toISOString().slice(0,10), tags: ["eng"], todos: [{ id: generateId(), text: "Update JWT logic", done: true }, { id: generateId(), text: "Add refresh token", done: false }] },
  { id: generateId(), name: "Write Q1 retrospective", status: "In Progress", priority: "Medium", size: "Small", progress: 30, notes: "Draft due Friday.", dueDate: new Date(Date.now() + 86400000).toISOString().slice(0,10), tags: ["writing"], todos: [] },
  { id: generateId(), name: "Update API docs", status: "Blocked", priority: "Medium", size: "Small", progress: 10, notes: "Waiting on backend changes.", dueDate: new Date(Date.now() - 86400000).toISOString().slice(0,10), tags: ["docs"], todos: [] },
  { id: generateId(), name: "Onboard new team member", status: "Not Started", priority: "Low", size: "Epic", progress: 0, notes: "", dueDate: "", tags: ["people"], todos: [] },
];

function ProgressBar({ value }) {
  const pct = Math.min(100, Math.max(0, value || 0));
  const color = pct === 100 ? "#22c55e" : pct > 50 ? "#0ea5e9" : pct > 20 ? "#f59e0b" : "#cbd5e1";
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
      <div style={{ flex: 1, height: 3, background: "#f1f5f9", borderRadius: 99, overflow: "hidden" }}>
        <div style={{ width: `${pct}%`, height: "100%", background: color, borderRadius: 99, transition: "width 0.4s cubic-bezier(.4,0,.2,1)" }} />
      </div>
      <span style={{ fontSize: 10, color: "#94a3b8", minWidth: 26, textAlign: "right", fontFamily: "monospace" }}>{pct}%</span>
    </div>
  );
}

function TagPill({ tag, onRemove }) {
  const c = getTagColor(tag);
  return (
    <span style={{ display: "inline-flex", alignItems: "center", gap: 4, padding: "2px 8px", borderRadius: 99, fontSize: 11, fontWeight: 500, color: c.color, background: c.bg, border: `1px solid ${c.border}` }}>
      {tag}
      {onRemove && <span onClick={e => { e.stopPropagation(); onRemove(tag); }} style={{ cursor: "pointer", opacity: 0.5, fontSize: 12, lineHeight: 1 }}>×</span>}
    </span>
  );
}

function TaskDetailPanel({ task, onUpdate, onClose, allTags }) {
  const [newTodo, setNewTodo] = useState("");
  const [newTag, setNewTag] = useState("");
  const [showTagSugg, setShowTagSugg] = useState(false);
  const cfg = STATUS_CONFIG[task.status];
  const pri = PRIORITY_CONFIG[task.priority];
  const sizeCfg = task.size ? SIZE_CONFIG[task.size] : null;
  const dateInfo = task.dueDate ? formatDate(task.dueDate) : null;

  const addTodo = () => {
    if (!newTodo.trim()) return;
    onUpdate("todos", [...(task.todos||[]), { id: generateId(), text: newTodo.trim(), done: false }]);
    setNewTodo("");
  };
  const toggleTodo = id => onUpdate("todos", (task.todos||[]).map(t => t.id===id ? {...t, done: !t.done} : t));
  const deleteTodo = id => onUpdate("todos", (task.todos||[]).filter(t => t.id!==id));
  const addTag = tag => {
    const t = tag.trim().toLowerCase();
    if (!t || (task.tags||[]).includes(t)) return;
    onUpdate("tags", [...(task.tags||[]), t]);
    setNewTag(""); setShowTagSugg(false);
  };
  const removeTag = tag => onUpdate("tags", (task.tags||[]).filter(t => t!==tag));
  const sugg = allTags.filter(t => !(task.tags||[]).includes(t) && t.includes(newTag.toLowerCase()));
  const doneTodos = (task.todos||[]).filter(t=>t.done).length;
  const totalTodos = (task.todos||[]).length;

  const fieldRow = (label, content) => (
    <div style={{ display: "flex", alignItems: "flex-start", gap: 12 }}>
      <span style={{ fontSize: 10, color: "#94a3b8", width: 66, flexShrink: 0, letterSpacing: 1, paddingTop: 4 }}>{label}</span>
      <div style={{ flex: 1 }}>{content}</div>
    </div>
  );

  return (
    <div style={{ position: "fixed", inset: 0, zIndex: 50, display: "flex", alignItems: "stretch" }}>
      <div onClick={onClose} style={{ flex: 1, background: "rgba(15,23,42,0.12)", backdropFilter: "blur(2px)" }} />
      <div style={{ width: 460, background: "#fff", borderLeft: "1px solid #e2e8f0", display: "flex", flexDirection: "column", overflowY: "auto", boxShadow: "-12px 0 48px rgba(0,0,0,0.07)", animation: "slideIn 0.22s cubic-bezier(.4,0,.2,1)" }}>

        {/* Header */}
        <div style={{ padding: "22px 24px 16px", borderBottom: "1px solid #f1f5f9" }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
            <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
              <span style={{ display: "inline-flex", alignItems: "center", gap: 5, padding: "3px 9px", borderRadius: 99, fontSize: 11, fontWeight: 500, color: cfg.color, background: cfg.bg, border: `1px solid ${cfg.border}` }}>
                <span style={{ width: 5, height: 5, borderRadius: "50%", background: cfg.dot, display: "inline-block" }} />{task.status}
              </span>
              <span style={{ display: "inline-flex", alignItems: "center", gap: 4, padding: "3px 9px", borderRadius: 99, fontSize: 11, fontWeight: 500, color: pri.color, background: pri.color+"15", border: `1px solid ${pri.color}30` }}>{pri.symbol} {task.priority}</span>
              {sizeCfg && <span style={{ display: "inline-flex", alignItems: "center", padding: "3px 9px", borderRadius: 99, fontSize: 11, fontWeight: 500, color: sizeCfg.color, background: sizeCfg.color+"15", border: `1px solid ${sizeCfg.color}30` }}>{task.size} <span style={{ color: sizeCfg.color+"80", marginLeft: 4, fontSize: 10 }}>{sizeCfg.desc}</span></span>}
              {dateInfo && <span style={{ display: "inline-flex", alignItems: "center", gap: 4, padding: "3px 9px", borderRadius: 99, fontSize: 11, fontWeight: 500, color: dateInfo.color, background: dateInfo.color+"15", border: `1px solid ${dateInfo.color}30` }}>📅 {dateInfo.label}</span>}
            </div>
            <button onClick={onClose} style={{ background: "#f8fafc", border: "1px solid #e2e8f0", cursor: "pointer", color: "#94a3b8", fontSize: 16, lineHeight: 1, padding: "4px 8px", borderRadius: 6, fontFamily: "inherit" }}>×</button>
          </div>
          <textarea key={task.id+"-name"} defaultValue={task.name} onBlur={e => onUpdate("name", e.target.value)} rows={2} placeholder="Task name..."
            style={{ width: "100%", border: "none", resize: "none", fontFamily: "'Syne', sans-serif", fontSize: 19, fontWeight: 800, color: "#0f172a", lineHeight: 1.3, background: "transparent", padding: 0 }} />
        </div>

        {/* Fields */}
        <div style={{ padding: "16px 24px", borderBottom: "1px solid #f1f5f9", display: "flex", flexDirection: "column", gap: 14 }}>
          {[
            { label: "STATUS", items: STATUSES, key: "status", getColor: s => STATUS_CONFIG[s].color, getBg: s => task.status===s ? STATUS_CONFIG[s].bg : "transparent", getBorder: s => task.status===s ? STATUS_CONFIG[s].border : "#e2e8f0" },
            { label: "PRIORITY", items: PRIORITIES, key: "priority", getColor: p => PRIORITY_CONFIG[p].color, getBg: p => task.priority===p ? PRIORITY_CONFIG[p].color+"18" : "transparent", getBorder: p => task.priority===p ? PRIORITY_CONFIG[p].color+"40" : "#e2e8f0" },
            { label: "SIZE", items: SIZES, key: "size", getColor: s => SIZE_CONFIG[s].color, getBg: s => task.size===s ? SIZE_CONFIG[s].color+"18" : "transparent", getBorder: s => task.size===s ? SIZE_CONFIG[s].color+"40" : "#e2e8f0" },
          ].map(row => fieldRow(row.label,
            <div style={{ display: "flex", gap: 5, flexWrap: "wrap" }}>
              {row.items.map(item => (
                <button key={item} onClick={() => onUpdate(row.key, item)} title={row.key==="size" ? SIZE_CONFIG[item].desc : undefined}
                  style={{ padding: "3px 10px", borderRadius: 99, fontSize: 11, cursor: "pointer", fontFamily: "inherit", fontWeight: 500, background: row.getBg(item), color: row.getColor(item), border: `1px solid ${row.getBorder(item)}` }}>{item}</button>
              ))}
            </div>
          ))}

          {fieldRow("DUE DATE",
            <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
              <input type="date" value={task.dueDate||""} onChange={e => onUpdate("dueDate", e.target.value)}
                style={{ border: "1px solid #e2e8f0", borderRadius: 7, padding: "4px 10px", fontSize: 12, color: "#334155", fontFamily: "inherit", background: "#fafafa", cursor: "pointer" }} />
              {task.dueDate && <button onClick={() => onUpdate("dueDate", "")} style={{ background: "none", border: "none", cursor: "pointer", color: "#cbd5e1", fontSize: 14, lineHeight: 1 }}>×</button>}
            </div>
          )}

          {fieldRow("PROGRESS",
            <div>
              <input type="range" min={0} max={100} value={task.progress||0} onChange={e => onUpdate("progress", +e.target.value)} />
              <div style={{ display: "flex", justifyContent: "space-between", marginTop: 1 }}>
                <span style={{ fontSize: 9, color: "#e2e8f0" }}>0%</span>
                <span style={{ fontSize: 11, color: "#0ea5e9", fontFamily: "monospace", fontWeight: 600 }}>{task.progress||0}%</span>
                <span style={{ fontSize: 9, color: "#e2e8f0" }}>100%</span>
              </div>
            </div>
          )}
        </div>

        {/* Tags */}
        <div style={{ padding: "16px 24px", borderBottom: "1px solid #f1f5f9" }}>
          <div style={{ fontSize: 10, color: "#94a3b8", letterSpacing: 1, marginBottom: 10, textTransform: "uppercase" }}>Tags</div>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginBottom: 10 }}>
            {(task.tags||[]).map(tag => <TagPill key={tag} tag={tag} onRemove={removeTag} />)}
          </div>
          <div style={{ position: "relative" }}>
            <div style={{ display: "flex", gap: 6 }}>
              <input value={newTag} onChange={e => { setNewTag(e.target.value); setShowTagSugg(true); }}
                onKeyDown={e => { if (e.key==="Enter") addTag(newTag); if (e.key==="Escape") setShowTagSugg(false); }}
                onFocus={() => setShowTagSugg(true)} onBlur={() => setTimeout(() => setShowTagSugg(false), 150)}
                placeholder="Add a tag..." style={{ flex: 1, border: "1px solid #e2e8f0", borderRadius: 7, padding: "7px 10px", fontFamily: "inherit", fontSize: 12, color: "#334155", background: "#fafafa" }} />
              <button onClick={() => addTag(newTag)} style={{ background: "#f1f5f9", color: "#64748b", border: "1px solid #e2e8f0", borderRadius: 7, padding: "7px 12px", fontSize: 12, cursor: "pointer", fontFamily: "inherit" }}>Add</button>
            </div>
            {showTagSugg && sugg.length > 0 && (
              <div style={{ position: "absolute", top: "calc(100% + 4px)", left: 0, right: 0, background: "#fff", border: "1px solid #e2e8f0", borderRadius: 8, boxShadow: "0 4px 16px rgba(0,0,0,0.08)", zIndex: 10, overflow: "hidden" }}>
                {sugg.slice(0,6).map(tag => (
                  <div key={tag} onMouseDown={() => addTag(tag)} style={{ padding: "8px 12px", cursor: "pointer", fontSize: 12, color: "#334155" }}>
                    <TagPill tag={tag} />
                  </div>
                ))}
              </div>
            )}
          </div>
        </div>

        {/* Notes */}
        <div style={{ padding: "16px 24px", borderBottom: "1px solid #f1f5f9" }}>
          <div style={{ fontSize: 10, color: "#94a3b8", letterSpacing: 1, marginBottom: 8, textTransform: "uppercase" }}>Notes</div>
          <textarea key={task.id+"-notes"} defaultValue={task.notes||""} onBlur={e => onUpdate("notes", e.target.value)} placeholder="Add notes, context, or details..." rows={4}
            style={{ width: "100%", border: "1px solid #e2e8f0", borderRadius: 8, padding: "10px 12px", fontFamily: "inherit", fontSize: 13, color: "#334155", lineHeight: 1.6, resize: "vertical", background: "#fafafa" }} />
        </div>

        {/* To-dos */}
        <div style={{ padding: "16px 24px", flex: 1 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
            <span style={{ fontSize: 10, color: "#94a3b8", letterSpacing: 1, textTransform: "uppercase" }}>To-dos</span>
            {totalTodos > 0 && <span style={{ fontSize: 11, color: "#94a3b8", fontFamily: "monospace" }}>{doneTodos}/{totalTodos} done</span>}
          </div>
          <div style={{ display: "flex", flexDirection: "column", gap: 4, marginBottom: 10 }}>
            {(task.todos||[]).map(todo => (
              <div key={todo.id} className="todo-row" style={{ display: "flex", alignItems: "center", gap: 8, padding: "7px 8px", borderRadius: 7, background: todo.done ? "#fafafa" : "#fff", border: "1px solid #f1f5f9" }}>
                <div onClick={() => toggleTodo(todo.id)} style={{ width: 16, height: 16, borderRadius: 4, flexShrink: 0, cursor: "pointer", border: `2px solid ${todo.done ? "#22c55e" : "#cbd5e1"}`, background: todo.done ? "#22c55e" : "transparent", display: "flex", alignItems: "center", justifyContent: "center" }}>
                  {todo.done && <span style={{ color: "#fff", fontSize: 9, lineHeight: 1 }}>✓</span>}
                </div>
                <span style={{ flex: 1, fontSize: 13, color: todo.done ? "#94a3b8" : "#334155", textDecoration: todo.done ? "line-through" : "none" }}>{todo.text}</span>
                <button className="todo-del" onClick={() => deleteTodo(todo.id)} style={{ background: "none", border: "none", cursor: "pointer", opacity: 0, color: "#ef4444", fontSize: 14, padding: "0 2px", lineHeight: 1 }}>×</button>
              </div>
            ))}
          </div>
          <div style={{ display: "flex", gap: 6 }}>
            <input value={newTodo} onChange={e => setNewTodo(e.target.value)} onKeyDown={e => { if (e.key==="Enter") addTodo(); }} placeholder="Add a to-do and press Enter..."
              style={{ flex: 1, border: "1px solid #e2e8f0", borderRadius: 7, padding: "8px 11px", fontFamily: "inherit", fontSize: 13, color: "#334155", background: "#fafafa" }} />
            <button onClick={addTodo} style={{ background: "#0f172a", color: "#fff", border: "none", borderRadius: 7, padding: "8px 14px", fontSize: 12, cursor: "pointer", fontFamily: "inherit", fontWeight: 500 }}>Add</button>
          </div>
        </div>
      </div>
    </div>
  );
}

function TaskRow({ task, onUpdate, onDelete, onClick, onDragStart, onDragOver, onDrop, isDragging, isDragOver }) {
  const cfg = STATUS_CONFIG[task.status];
  const pri = PRIORITY_CONFIG[task.priority];
  const sizeCfg = task.size ? SIZE_CONFIG[task.size] : null;
  const todoCount = (task.todos||[]).length;
  const doneTodos = (task.todos||[]).filter(t=>t.done).length;
  const dateInfo = task.dueDate ? formatDate(task.dueDate) : null;

  return (
    <div className="task-row" draggable onDragStart={onDragStart} onDragOver={e => { e.preventDefault(); onDragOver(); }} onDrop={onDrop} onClick={onClick}
      style={{ display: "grid", gridTemplateColumns: "24px 1fr 120px 72px 72px 80px 90px 28px", borderBottom: isDragOver ? "2px solid #0ea5e9" : "1px solid #f8fafc", alignItems: "center", cursor: "pointer", opacity: isDragging ? 0.4 : 1, background: isDragOver ? "#f0f9ff" : "transparent" }}>
      <div className="drag-handle" onClick={e => e.stopPropagation()}>⋮⋮</div>
      <div style={{ padding: "10px 8px" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 7, flexWrap: "wrap" }}>
          <div style={{ width: 6, height: 6, borderRadius: "50%", background: cfg.dot, flexShrink: 0 }} />
          <span style={{ fontSize: 13, color: task.status==="Done" ? "#94a3b8" : "#1e293b", fontWeight: 500, textDecoration: task.status==="Done" ? "line-through" : "none" }}>
            {task.name || <span style={{ color: "#cbd5e1", fontWeight: 400 }}>Untitled</span>}
          </span>
          {todoCount > 0 && <span style={{ fontSize: 10, color: doneTodos===todoCount ? "#22c55e" : "#94a3b8", background: doneTodos===todoCount ? "#f0fdf4" : "#f8fafc", border: `1px solid ${doneTodos===todoCount ? "#bbf7d0" : "#e2e8f0"}`, borderRadius: 99, padding: "1px 6px", fontFamily: "monospace" }}>{doneTodos}/{todoCount}</span>}
          {task.notes && <span style={{ fontSize: 11, color: "#cbd5e1" }} title="Has notes">✎</span>}
        </div>
      </div>
      <div style={{ padding: "10px 10px" }}>
        <span style={{ fontSize: 11, fontWeight: 500, color: cfg.color, background: cfg.bg, border: `1px solid ${cfg.border}`, borderRadius: 99, padding: "2px 8px" }}>{task.status}</span>
      </div>
      <div style={{ padding: "10px 8px" }}><span style={{ fontSize: 12, color: pri.color }}>{pri.symbol} {task.priority}</span></div>
      <div style={{ padding: "10px 8px" }}>{sizeCfg ? <span style={{ fontSize: 11, color: sizeCfg.color, fontWeight: 500 }}>{task.size}</span> : <span style={{ fontSize: 11, color: "#e2e8f0" }}>—</span>}</div>
      <div style={{ padding: "10px 10px" }}><ProgressBar value={task.progress} /></div>
      <div style={{ padding: "10px 8px" }}>
        {dateInfo ? <span style={{ fontSize: 11, color: dateInfo.color, fontWeight: dateInfo.urgent ? 600 : 400, whiteSpace: "nowrap" }}>{dateInfo.label}</span> : <span style={{ fontSize: 11, color: "#e2e8f0" }}>—</span>}
      </div>
      <div style={{ padding: "10px 8px", textAlign: "center" }} onClick={e => { e.stopPropagation(); onDelete(); }}>
        <button style={{ background: "none", border: "none", cursor: "pointer", color: "#e2e8f0", fontSize: 16, lineHeight: 1, padding: 2 }}
          onMouseEnter={e => e.target.style.color="#ef4444"} onMouseLeave={e => e.target.style.color="#e2e8f0"}>×</button>
      </div>
    </div>
  );
}

function App() {
  const [tasks, setTasks] = useState(() => {
    try { const saved = localStorage.getItem("camille-tracker-tasks"); return saved ? JSON.parse(saved) : SAMPLE_TASKS; }
    catch { return SAMPLE_TASKS; }
  });
  const [filter, setFilter] = useState("All");
  const [search, setSearch] = useState("");
  const [selectedId, setSelectedId] = useState(null);
  const [dragId, setDragId] = useState(null);
  const [dragOverId, setDragOverId] = useState(null);

  useEffect(() => {
    try { localStorage.setItem("camille-tracker-tasks", JSON.stringify(tasks)); } catch {}
  }, [tasks]);

  const selectedTask = tasks.find(t => t.id === selectedId);
  const done = tasks.filter(t => t.status==="Done").length;
  const inProgress = tasks.filter(t => t.status==="In Progress").length;
  const blocked = tasks.filter(t => t.status==="Blocked").length;
  const motto = getMotto(done, tasks.length);
  const allTags = [...new Set(tasks.flatMap(t => t.tags||[]))];

  let displayed = filter==="All" ? tasks : tasks.filter(t => t.status===filter);
  if (search.trim()) {
    const q = search.toLowerCase();
    displayed = displayed.filter(t => t.name.toLowerCase().includes(q) || (t.tags||[]).some(tag => tag.includes(q)) || (t.notes||"").toLowerCase().includes(q));
  }

  const addTask = () => {
    const t = { id: generateId(), name: "", status: "Not Started", priority: "Medium", size: null, progress: 0, notes: "", dueDate: "", tags: [], todos: [] };
    setTasks(prev => [...prev, t]);
    setSelectedId(t.id);
  };
  const updateTask = (id, key, val) => setTasks(prev => prev.map(t => t.id===id ? {...t, [key]: val} : t));
  const deleteTask = id => { setTasks(prev => prev.filter(t => t.id!==id)); if (selectedId===id) setSelectedId(null); };

  const handleDrop = targetId => {
    if (!dragId || dragId===targetId) return;
    setTasks(prev => {
      const arr = [...prev];
      const fi = arr.findIndex(t => t.id===dragId), ti = arr.findIndex(t => t.id===targetId);
      const [m] = arr.splice(fi, 1); arr.splice(ti, 0, m);
      return arr;
    });
    setDragId(null); setDragOverId(null);
  };

  const btn = (onClick, children, style={}) => (
    <button onClick={onClick} style={{ background: "#0f172a", color: "#fff", border: "none", borderRadius: 8, padding: "9px 18px", fontSize: 13, fontWeight: 500, cursor: "pointer", fontFamily: "inherit", ...style }}
      onMouseEnter={e => e.currentTarget.style.background="#334155"} onMouseLeave={e => e.currentTarget.style.background="#0f172a"}>
      {children}
    </button>
  );

  return (
    <div style={{ minHeight: "100vh", background: "#f8fafc", padding: "40px 32px" }}>

      {/* Header */}
      <div style={{ marginBottom: 28, display: "flex", justifyContent: "space-between", alignItems: "flex-end" }}>
        <div>
          <h1 style={{ margin: "0 0 4px", fontFamily: "'Syne', sans-serif", fontSize: 26, fontWeight: 800, color: "#0f172a", letterSpacing: "-0.5px" }}>Camille's Tracker</h1>
          <p style={{ margin: 0, fontSize: 12, color: "#94a3b8" }}>{motto}</p>
        </div>
        {btn(addTask, "+ New Task")}
      </div>

      {/* Stats */}
      <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 12, marginBottom: 20 }}>
        {[
          { label: "Total", value: tasks.length, color: "#64748b", sub: "tasks" },
          { label: "Done", value: done, color: "#22c55e", sub: `of ${tasks.length}` },
          { label: "Active", value: inProgress, color: "#0ea5e9", sub: "in progress" },
          { label: "Blocked", value: blocked, color: "#ef4444", sub: "need attention" },
        ].map(s => (
          <div key={s.label} style={{ background: "#fff", border: "1px solid #e2e8f0", borderRadius: 12, padding: "16px 18px", boxShadow: "0 1px 3px rgba(0,0,0,0.04)" }}>
            <div style={{ fontSize: 10, color: "#94a3b8", letterSpacing: 1, marginBottom: 6, textTransform: "uppercase" }}>{s.label}</div>
            <div style={{ display: "flex", alignItems: "baseline", gap: 6 }}>
              <span style={{ fontSize: 28, fontFamily: "'Syne', sans-serif", fontWeight: 800, color: s.color, lineHeight: 1 }}>{s.value}</span>
              <span style={{ fontSize: 11, color: "#cbd5e1" }}>{s.sub}</span>
            </div>
          </div>
        ))}
      </div>

      {/* Search + filters */}
      <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 0 }}>
        <div style={{ position: "relative", flex: "0 0 240px" }}>
          <span style={{ position: "absolute", left: 10, top: "50%", transform: "translateY(-50%)", color: "#cbd5e1", fontSize: 13, pointerEvents: "none" }}>🔍</span>
          <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Search tasks, tags, notes..."
            style={{ width: "100%", border: "1px solid #e2e8f0", borderRadius: "6px 6px 0 0", padding: "8px 10px 8px 30px", fontSize: 12, fontFamily: "inherit", color: "#334155", background: "#fff", borderBottom: "1px solid #fff" }} />
        </div>
        <div style={{ display: "flex", gap: 2, flex: 1 }}>
          {["All", ...STATUSES].map(s => (
            <button key={s} onClick={() => setFilter(s)} style={{
              background: filter===s ? "#fff" : "transparent", border: "1px solid",
              borderColor: filter===s ? "#e2e8f0" : "transparent",
              borderBottom: filter===s ? "1px solid #fff" : "1px solid transparent",
              color: filter===s ? "#1e293b" : "#94a3b8",
              fontSize: 12, fontWeight: filter===s ? 600 : 400,
              padding: "7px 14px", borderRadius: "6px 6px 0 0",
              cursor: "pointer", fontFamily: "inherit",
              position: "relative", bottom: -1, zIndex: filter===s ? 1 : 0
            }}>{s}</button>
          ))}
        </div>
      </div>

      {/* Table */}
      <div style={{ background: "#fff", border: "1px solid #e2e8f0", borderRadius: "0 8px 12px 12px", overflow: "hidden", boxShadow: "0 1px 3px rgba(0,0,0,0.04)", position: "relative", zIndex: 0 }}>
        <div style={{ display: "grid", gridTemplateColumns: "24px 1fr 120px 72px 72px 80px 90px 28px", borderBottom: "1px solid #f1f5f9", background: "#fafafa" }}>
          {["", "TASK", "STATUS", "PRI", "SIZE", "PROGRESS", "DUE", ""].map((h, i) => (
            <div key={i} style={{ padding: "9px 8px", fontSize: 9, color: "#cbd5e1", letterSpacing: 1.5, fontWeight: 600 }}>
              {i===1 ? <span style={{ paddingLeft: 14 }}>{h}</span> : h}
            </div>
          ))}
        </div>

        {displayed.length === 0
          ? <div style={{ padding: "48px", textAlign: "center", color: "#cbd5e1", fontSize: 13 }}>{search ? `No results for "${search}"` : "No tasks here yet."}</div>
          : displayed.map(task => (
            <TaskRow key={task.id} task={task}
              onUpdate={(key, val) => updateTask(task.id, key, val)}
              onDelete={() => deleteTask(task.id)}
              onClick={() => setSelectedId(task.id)}
              onDragStart={() => setDragId(task.id)}
              onDragOver={() => setDragOverId(task.id)}
              onDrop={() => handleDrop(task.id)}
              isDragging={dragId===task.id}
              isDragOver={dragOverId===task.id && dragId!==task.id}
            />
          ))
        }

        <div style={{ borderTop: "1px solid #f8fafc" }}>
          <button onClick={addTask} style={{ width: "100%", background: "transparent", border: "none", color: "#cbd5e1", cursor: "pointer", padding: "10px 16px", textAlign: "left", fontSize: 12, fontFamily: "inherit" }}
            onMouseEnter={e => { e.target.style.color="#64748b"; e.target.style.background="#fafafa"; }}
            onMouseLeave={e => { e.target.style.color="#cbd5e1"; e.target.style.background="transparent"; }}
          >+ add task</button>
        </div>
      </div>

      {selectedTask && (
        <TaskDetailPanel task={selectedTask} allTags={allTags}
          onUpdate={(key, val) => updateTask(selectedTask.id, key, val)}
          onClose={() => setSelectedId(null)}
        />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
